        <a href="index.html" class="nav-brand">
            <i class="fas fa-shield-halved"></i>
            <span>CyberMatrix</span>
        </a>
        
        <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html" class="nav-link active">Home</a></li>
            <li><a href="about.html" class="nav-link">About</a></li>
            <li><a href="threats.html" class="nav-link">Threats</a></li>
            <li><a href="tools.html" class="nav-link">Tools</a></li>
            <li><a href="articles.html" class="nav-link">Articles</a></li>
            <li><a href="news.html" class="nav-link">News</a></li>
            <li><a href="helpline.html" class="nav-link">Helpline</a></li>
            <li><a href="contact.html" class="nav-link">Contact</a></li>
        </ul>
        
        <div class="nav-actions">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <i class="fas fa-moon"></i>
            </button>
            <a href="login.html" class="btn-matrix btn-matrix-outline" style="padding: 0.4rem 1.2rem; font-size: 0.75rem;">
                <i class="fas fa-key"></i> Login
            </a>
        </div>
    </div>

<style>
    .navbar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(6, 15, 6, 0.95);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid #1f7a33;
        box-shadow: 0 0 30px rgba(0, 170, 51, 0.1);
    }
    
    .nav-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.8rem 1.5rem;
        max-width: 1200px;
        margin: 0 auto;
    }
    
    .nav-brand {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 1.3rem;
        color: #aaffaa;
        text-shadow: 0 0 16px #22dd66, 0 0 40px #22aa44;
        letter-spacing: 2px;
        text-decoration: none;
    }
    
    .nav-brand i {
        font-size: 1.5rem;
        color: #3ddf6a;
        filter: drop-shadow(0 0 12px #22dd66);
    }
    
    .nav-links {
        display: flex;
        list-style: none;
        gap: 0.3rem;
    }
    
    .nav-link {
        color: #88dd99;
        text-decoration: none;
        padding: 0.4rem 0.9rem;
        border-radius: 8px;
        font-size: 0.8rem;
        letter-spacing: 1px;
        transition: all 0.2s ease;
        border: 1px solid transparent;
    }
    
    .nav-link:hover,
    .nav-link.active {
        background: rgba(15, 47, 26, 0.6);
        border-color: #2aac4a;
        color: #ddffdd;
        box-shadow: 0 0 15px rgba(0, 221, 85, 0.2);
    }
    
    .nav-actions {
        display: flex;
        align-items: center;
        gap: 0.8rem;
    }
    
    .theme-toggle {
        background: transparent;
        border: 1px solid #1f7a33;
        color: #88dd99;
        width: 35px;
        height: 35px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        font-size: 0.9rem;
    }
    
    .theme-toggle:hover {
        border-color: #3ad86a;
        box-shadow: 0 0 15px rgba(34, 221, 102, 0.3);
        color: #ddffdd;
    }
    
    .nav-toggle {
        display: none;
        flex-direction: column;
        gap: 5px;
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 5px;
    }
    
    .nav-toggle span {
        width: 25px;
        height: 2px;
        background: #88dd99;
        border-radius: 2px;
        transition: all 0.3s ease;
    }
    
    @media (max-width: 900px) {
        .nav-links {
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            flex-direction: column;
            background: rgba(6, 15, 6, 0.98);
            backdrop-filter: blur(12px);
            padding: 1rem;
            gap: 0.2rem;
            transform: translateY(-120%);
            transition: transform 0.3s ease;
            border-bottom: 1px solid #1f7a33;
        }
        
        .nav-links.open {
            transform: translateY(0);
        }
        
        .nav-toggle {
            display: flex;
        }
        
        .nav-link {
            padding: 0.7rem 1rem;
            display: block;
        }
    }
</style>

<script>
    // Navbar toggle for mobile
    document.getElementById('navToggle')?.addEventListener('click', function() {
        document.getElementById('navLinks')?.classList.toggle('open');
    });
    
    // Set active nav link based on current page
    (function() {
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('href') === currentPage) {
                link.classList.add('active');
            }
        });
    })();
</script>
