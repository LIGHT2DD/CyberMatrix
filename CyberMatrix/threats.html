<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Threat Intelligence — CyberMatrix</title>
    <meta
      name="description"
      content="Explore cybersecurity threats: malware, phishing, ransomware, DDoS, zero-day exploits, social engineering, and insider threats."
    />
    <link rel="stylesheet" href="assets/css/matrix-theme.css" />
  </head>
  <body>
    <div id="navbar-container"></div>

    <!-- PAGE HEADER -->
    <section class="section">
      <div class="container">
        <div class="page-header">
          <h1 class="section-title">
            <i class="fas fa-skull"></i> Threat Intelligence
          </h1>
          <p class="section-subtitle">// understand the attack landscape</p>
          <p style="color: #88dd99; max-width: 700px; margin-bottom: 2rem">
            Comprehensive analysis of the most prevalent cybersecurity threats.
            Select a category below to filter, or browse all threats.
          </p>
        </div>

        <!-- CATEGORY FILTERS -->
        <div class="threat-filters" id="threatFilters">
          <button class="filter-btn active" data-filter="all">
            <i class="fas fa-globe"></i> All Threats
          </button>
          <button class="filter-btn" data-filter="malware">
            <i class="fas fa-virus"></i> Malware
          </button>
          <button class="filter-btn" data-filter="phishing">
            <i class="fas fa-fish"></i> Phishing
          </button>
          <button class="filter-btn" data-filter="ransomware">
            <i class="fas fa-skull"></i> Ransomware
          </button>
          <button class="filter-btn" data-filter="ddos">
            <i class="fas fa-network-wired"></i> DDoS
          </button>
          <button class="filter-btn" data-filter="zero-day">
            <i class="fas fa-biohazard"></i> Zero-Day
          </button>
          <button class="filter-btn" data-filter="social-engineering">
            <i class="fas fa-users"></i> Social Engineering
          </button>
          <button class="filter-btn" data-filter="insider-threat">
            <i class="fas fa-user-secret"></i> Insider Threat
          </button>
        </div>
      </div>
    </section>

    <!-- THREATS GRID -->
    <section class="section" style="padding-top: 0">
      <div class="container">
        <div class="grid-2" id="threatsGrid">
          <!-- Populated by JS -->
        </div>
        <div
          id="noResults"
          style="
            display: none;
            text-align: center;
            padding: 3rem;
            color: #88dd99;
          "
        >
          <i
            class="fas fa-search"
            style="font-size: 2rem; display: block; margin-bottom: 1rem"
          ></i>
          No threats match this filter.
        </div>
      </div>
    </section>

    <!-- THREAT DETAIL MODAL -->
    <div class="modal-overlay" id="threatModal" style="display: none">
      <div class="modal-content panel">
        <button class="modal-close" id="closeModal">&times;</button>
        <div id="modalBody">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

    <div id="footer-container"></div>

    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/threats.js"></script>
  </body>
</html>

<style>
  .page-header {
    margin-bottom: 2rem;
  }

  /* Filter buttons */
  .threat-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-bottom: 2.5rem;
  }

  .filter-btn {
    background: rgba(10, 50, 16, 0.4);
    border: 1px solid #1f7a33;
    color: #88dd99;
    padding: 0.5rem 1.2rem;
    border-radius: 40px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: "Share Tech Mono", monospace;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-shadow: 0 0 4px #22aa44;
  }

  .filter-btn i {
    font-size: 0.7rem;
    color: #44dd77;
  }

  .filter-btn:hover {
    background: rgba(20, 80, 30, 0.5);
    border-color: #3ad86a;
    color: #ddffdd;
    box-shadow: 0 0 18px rgba(34, 221, 102, 0.25);
  }

  .filter-btn.active {
    background: linear-gradient(145deg, #0f3f1a, #0a2a12);
    border-color: #3ad86a;
    color: #eeffee;
    box-shadow:
      0 0 22px rgba(34, 221, 102, 0.35),
      inset 0 0 10px rgba(0, 221, 85, 0.1);
  }

  /* Threat cards */
  .threat-card {
    background: var(--bg-panel-alt);
    border: 1px solid var(--border-primary);
    border-radius: 1.2rem;
    padding: 1.8rem;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .threat-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 4px;
    height: 100%;
    background: #1f7a33;
    transition: all 0.25s ease;
  }

  .threat-card:hover {
    border-color: var(--border-glow);
    box-shadow: 0 0 30px rgba(0, 221, 85, 0.2);
    transform: translateY(-3px);
  }

  .threat-card:hover::before {
    background: #3ad86a;
    box-shadow: 0 0 15px #3ad86a;
  }

  .threat-card.severity-low::before {
    background: #3ddf6a;
  }
  .threat-card.severity-guarded::before {
    background: #ffd54f;
  }
  .threat-card.severity-elevated::before {
    background: #ff8c00;
  }
  .threat-card.severity-high::before {
    background: #ff5d5d;
  }
  .threat-card.severity-critical::before {
    background: #111111;
  }

  .threat-card-header {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .threat-card-icon {
    font-size: 2rem;
    color: #3ddf6a;
    filter: drop-shadow(0 0 12px #22dd66);
    flex-shrink: 0;
  }

  .threat-card-info h3 {
    font-size: 1.1rem;
    margin-bottom: 0.3rem;
  }

  .threat-card-info .category-label {
    font-size: 0.6rem;
    color: #66dd88;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .threat-card-body {
    font-size: 0.8rem;
    color: #88bb99;
    line-height: 1.7;
    margin-bottom: 1rem;
  }

  .threat-indicators-preview,
  .indicators-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
  }

  .threat-indicators-preview {
    margin-bottom: 1rem;
  }

  .indicator-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    max-width: 100%;
    border: 1px solid rgba(31, 122, 51, 0.55);
    border-radius: 999px;
    background: rgba(0, 60, 20, 0.28);
    color: #a8efba;
    padding: 0.24rem 0.65rem;
    font-size: 0.62rem;
    line-height: 1.4;
    overflow-wrap: anywhere;
  }

  .indicator-chip strong {
    color: #66dd88;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .threat-card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .severity-badge {
    font-size: 0.6rem;
    padding: 0.2rem 0.8rem;
    border-radius: 40px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .severity-badge.low {
    background: rgba(61, 223, 106, 0.2);
    color: #6eff92;
    border: 1px solid #3ddf6a;
  }

  .severity-badge.guarded {
    background: rgba(255, 213, 79, 0.2);
    color: #ffd54f;
    border: 1px solid #ffd54f;
  }

  .severity-badge.elevated {
    background: rgba(255, 140, 0, 0.2);
    color: #ffaa44;
    border: 1px solid #ff8c00;
  }

  .severity-badge.high {
    background: rgba(255, 93, 93, 0.2);
    color: #ff7b7b;
    border: 1px solid #ff5d5d;
  }

  .severity-badge.critical {
    background: rgba(17, 17, 17, 0.95);
    color: #f2f2f2;
    border: 1px solid #333333;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .modal-content {
    max-width: 650px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
    animation: fadeSlide 0.3s ease;
  }

  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: rgba(255, 50, 50, 0.2);
    border: 1px solid #ff4444;
    color: #ff7777;
    width: 35px;
    height: 35px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Share Tech Mono", monospace;
  }

  .modal-close:hover {
    background: rgba(255, 50, 50, 0.4);
    box-shadow: 0 0 20px rgba(255, 50, 50, 0.4);
  }

  .modal-detail-icon {
    font-size: 3rem;
    color: #3ddf6a;
    filter: drop-shadow(0 0 20px #22dd66);
    margin-bottom: 1rem;
  }

  .modal-detail h3 {
    font-size: 1.5rem;
    margin-bottom: 0.8rem;
  }

  .modal-detail .indicators-list,
  .modal-detail .mitigation-text {
    font-size: 0.8rem;
    color: #88dd99;
    line-height: 1.8;
  }

  .modal-detail .indicators-list li {
    margin-bottom: 0.3rem;
  }

  @media (max-width: 768px) {
    .threat-filters {
      gap: 0.4rem;
    }
    .filter-btn {
      padding: 0.4rem 0.8rem;
      font-size: 0.7rem;
    }
  }
</style>
