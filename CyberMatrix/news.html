<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News & Alerts — CyberMatrix</title>
    <meta name="description" content="Latest cybersecurity news, CVE alerts, security incidents, and threat intelligence updates." />
    <link rel="stylesheet" href="assets/css/matrix-theme.css" />
</head>
<body>
    <div id="navbar-container"></div>

    <section class="section">
        <div class="container">
            <h1 class="section-title"><i class="fas fa-newspaper"></i> News & Alerts</h1>
            <p class="section-subtitle">// latest cybersecurity updates</p>

            <!-- SEARCH & CATEGORY FILTERS -->
            <div class="news-toolbar">
                <div class="search-box-local">
                    <i class="fas fa-search"></i>
                    <input type="text" id="newsSearch" placeholder="Search news..." />
                </div>
                <div class="news-filters" id="newsFilters">
                    <button class="filter-btn active" data-filter="all">
                        <i class="fas fa-globe"></i> All News
                    </button>
                    <button class="filter-btn" data-filter="alert">
                        <i class="fas fa-exclamation-triangle"></i> Alerts
                    </button>
                    <button class="filter-btn" data-filter="threat">
                        <i class="fas fa-skull"></i> Threats
                    </button>
                    <button class="filter-btn" data-filter="incident">
                        <i class="fas fa-fire"></i> Incidents
                    </button>
                    <button class="filter-btn" data-filter="update">
                        <i class="fas fa-sync-alt"></i> Updates
                    </button>
                    <button class="filter-btn" data-filter="trend">
                        <i class="fas fa-chart-line"></i> Trends
                    </button>
                </div>
            </div>

            <!-- NEWS LIST -->
            <div id="newsList">
                <!-- Populated by JS -->
            </div>
            <div id="noNews" style="display: none; text-align: center; padding: 3rem; color: #88dd99;">
                <i class="fas fa-newspaper" style="font-size: 2rem; display: block; margin-bottom: 1rem;"></i>
                No news in this category yet.
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/news.js"></script>
</body>
</html>

<style>
    .news-toolbar {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
        margin-bottom: 2rem;
    }

    .search-box-local {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        background: rgba(2, 15, 4, 0.8);
        border: 1px solid #1f7a33;
        border-radius: 60px;
        padding: 0.5rem 1.2rem;
        transition: border 0.2s, box-shadow 0.2s;
    }

    .search-box-local:focus-within {
        border-color: #3ad86a;
        box-shadow: 0 0 20px rgba(0, 221, 85, 0.2);
    }

    .search-box-local i {
        color: #44dd77;
        font-size: 0.85rem;
    }

    .search-box-local input {
        flex: 1;
        background: transparent;
        border: none;
        padding: 0.6rem 0;
        font-size: 0.85rem;
        color: #ccffcc;
        font-family: 'Share Tech Mono', monospace;
        outline: none;
    }

    .search-box-local input::placeholder {
        color: #448855;
    }

    .news-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
    }

    .filter-btn {
        background: rgba(10, 50, 16, 0.3);
        border: 1px solid #1f7a33;
        color: #88dd99;
        padding: 0.45rem 1.1rem;
        border-radius: 40px;
        font-size: 0.7rem;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: 'Share Tech Mono', monospace;
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        gap: 0.4rem;
    }

    .filter-btn i { font-size: 0.65rem; color: #44dd77; }
    .filter-btn:hover {
        background: rgba(20, 80, 30, 0.5);
        border-color: #3ad86a;
        color: #ddffdd;
        box-shadow: 0 0 12px rgba(34, 221, 102, 0.2);
    }
    .filter-btn.active {
        background: linear-gradient(145deg, #0f3f1a, #0a2a12);
        border-color: #3ad86a;
        color: #eeffee;
        box-shadow: 0 0 15px rgba(34, 221, 102, 0.3);
    }

    /* News item */
    .news-item {
        background: var(--bg-panel-alt);
        border: 1px solid var(--border-primary);
        border-radius: 1rem;
        padding: 1.5rem 1.8rem;
        margin-bottom: 1rem;
        transition: all 0.25s ease;
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 1.2rem;
        align-items: center;
    }

    .news-item:hover {
        border-color: var(--border-glow);
        box-shadow: 0 0 20px rgba(0, 221, 85, 0.15);
        transform: translateX(4px);
    }

    #newsList {
        transition: opacity 0.18s ease, transform 0.18s ease;
    }

    #newsList.is-filtering {
        opacity: 0.55;
        transform: translateY(4px);
    }

    .news-category-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        flex-shrink: 0;
    }

    .news-category-icon.alert {
        background: rgba(255, 50, 50, 0.2);
        border: 1px solid #ff4444;
        color: #ff7777;
    }
    .news-category-icon.threat {
        background: rgba(255, 140, 0, 0.2);
        border: 1px solid #ff8c00;
        color: #ffaa44;
    }
    .news-category-icon.incident {
        background: rgba(255, 50, 50, 0.25);
        border: 1px solid #ff5555;
        color: #ff6666;
    }
    .news-category-icon.update {
        background: rgba(0, 180, 100, 0.2);
        border: 1px solid #27c93f;
        color: #44dd77;
    }
    .news-category-icon.trend {
        background: rgba(100, 100, 255, 0.2);
        border: 1px solid #6666ff;
        color: #8888ff;
    }

    .news-content h3 {
        font-size: 1rem;
        margin-bottom: 0.3rem;
        line-height: 1.4;
    }
    .news-content p {
        font-size: 0.78rem;
        color: #88bb99;
        line-height: 1.6;
    }
    .news-meta {
        display: flex;
        gap: 1.2rem;
        font-size: 0.6rem;
        color: #66aa77;
        margin-top: 0.5rem;
    }
    .news-meta span {
        display: flex;
        align-items: center;
        gap: 0.3rem;
    }

    .news-badge {
        display: inline-block;
        padding: 0.2rem 0.7rem;
        border-radius: 20px;
        font-size: 0.6rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        flex-shrink: 0;
    }
    .news-badge.alert {
        background: rgba(255, 50, 50, 0.2);
        color: #ff7777;
        border: 1px solid #ff4444;
    }
    .news-badge.threat {
        background: rgba(255, 140, 0, 0.2);
        color: #ffaa44;
        border: 1px solid #ff8c00;
    }
    .news-badge.incident {
        background: rgba(255, 60, 60, 0.2);
        color: #ff7777;
        border: 1px solid #ff5555;
    }
    .news-badge.update {
        background: rgba(0, 200, 100, 0.15);
        color: #44dd77;
        border: 1px solid #27c93f;
    }
    .news-badge.trend {
        background: rgba(100, 100, 255, 0.15);
        color: #8888ff;
        border: 1px solid #6666ff;
    }

    @media (max-width: 700px) {
        .news-item {
            grid-template-columns: 1fr;
            gap: 0.8rem;
        }
        .news-category-icon {
            width: 36px;
            height: 36px;
            font-size: 0.9rem;
        }
        .news-badge {
            justify-self: start;
        }
    }
</style>
