<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Articles — CyberMatrix</title>
    <meta name="description" content="Cybersecurity articles covering threats, defense strategies, incident response, cloud security, and identity management." />
    <link rel="stylesheet" href="assets/css/matrix-theme.css" />
</head>
<body>
    <div id="navbar-container"></div>

    <section class="section">
        <div class="container">
            <h1 class="section-title"><i class="fas fa-newspaper"></i> Articles</h1>
            <p class="section-subtitle">// cybersecurity knowledge base</p>

            <!-- SEARCH & FILTERS -->
            <div class="articles-toolbar">
                <div class="search-box-local">
                    <i class="fas fa-search"></i>
                    <input type="text" id="articleSearch" placeholder="Search articles..." />
                </div>
                <div class="category-filters" id="categoryFilters">
                    <button class="filter-btn active" data-category="all">All</button>
                    <button class="filter-btn" data-category="threats">Threats</button>
                    <button class="filter-btn" data-category="defense">Defense</button>
                    <button class="filter-btn" data-category="incident-response">Incident Response</button>
                    <button class="filter-btn" data-category="cloud">Cloud</button>
                    <button class="filter-btn" data-category="identity">Identity</button>
                </div>
            </div>

            <!-- ARTICLES GRID -->
            <div class="grid-2" id="articlesGrid">
                <!-- Populated by JS -->
            </div>

            <div id="noArticles" style="display: none; text-align: center; padding: 3rem; color: #88dd99;">
                <i class="fas fa-search" style="font-size: 2rem; display: block; margin-bottom: 1rem;"></i>
                No articles match your search.
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/articles.js"></script>
</body>
</html>

<style>
    .articles-toolbar {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
        margin-bottom: 2.5rem;
    }

    .search-box-local {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        background: rgba(2, 15, 4, 0.8);
        border: 1px solid #1f7a33;
        border-radius: 60px;
        padding: 0.5rem 1.2rem;
        transition: border 0.2s, box-shadow 0.2s;
    }

    .search-box-local:focus-within {
        border-color: #3ad86a;
        box-shadow: 0 0 20px rgba(0, 221, 85, 0.2);
    }

    .search-box-local i {
        color: #44dd77;
        font-size: 0.85rem;
    }

    .search-box-local input {
        flex: 1;
        background: transparent;
        border: none;
        padding: 0.6rem 0;
        font-size: 0.85rem;
        color: #ccffcc;
        font-family: 'Share Tech Mono', monospace;
        outline: none;
    }

    .search-box-local input::placeholder {
        color: #448855;
    }

    .category-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
    }

    .filter-btn {
        background: rgba(10, 50, 16, 0.3);
        border: 1px solid #1f7a33;
        color: #88dd99;
        padding: 0.4rem 1rem;
        border-radius: 40px;
        font-size: 0.7rem;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: 'Share Tech Mono', monospace;
        letter-spacing: 1px;
    }

    .filter-btn:hover {
        background: rgba(20, 80, 30, 0.5);
        border-color: #3ad86a;
        color: #ddffdd;
    }

    .filter-btn.active {
        background: linear-gradient(145deg, #0f3f1a, #0a2a12);
        border-color: #3ad86a;
        color: #eeffee;
        box-shadow: 0 0 15px rgba(34, 221, 102, 0.3);
    }

    /* Article card */
    .article-card {
        background: var(--bg-panel-alt);
        border: 1px solid var(--border-primary);
        border-radius: 1.2rem;
        padding: 1.8rem;
        transition: all 0.25s ease;
        cursor: pointer;
    }

    .article-card:hover {
        border-color: var(--border-glow);
        box-shadow: 0 0 25px rgba(0, 221, 85, 0.2);
        transform: translateY(-3px);
    }

    .article-category {
        display: inline-block;
        font-size: 0.6rem;
        color: #66dd88;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 0.8rem;
        padding: 0.2rem 0.8rem;
        background: rgba(0, 60, 20, 0.4);
        border-radius: 40px;
        border: 1px solid #1f7a33;
    }

    .article-card h3 {
        font-size: 1.1rem;
        margin-bottom: 0.6rem;
        line-height: 1.4;
    }

    .article-card p {
        font-size: 0.8rem;
        color: #88bb99;
        line-height: 1.7;
        margin-bottom: 1rem;
    }

    .article-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.65rem;
        color: #66aa77;
        padding-top: 0.8rem;
        border-top: 1px solid rgba(31, 122, 51, 0.3);
    }

    .article-meta span {
        display: flex;
        align-items: center;
        gap: 0.4rem;
    }

    .article-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-top: 0.8rem;
    }

    .article-tag {
        font-size: 0.6rem;
        padding: 0.15rem 0.6rem;
        background: rgba(0, 60, 20, 0.3);
        border: 1px solid rgba(31, 122, 51, 0.4);
        border-radius: 20px;
        color: #88dd99;
    }

    #articlesGrid {
        transition: opacity 0.18s ease, transform 0.18s ease;
    }

    #articlesGrid.is-filtering {
        opacity: 0.55;
        transform: translateY(4px);
    }
</style>
